<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaqueta Kai'Sa y Akali | JINX Shop</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body class="dark-theme">

    <header class="main-header">
        <div class="header-container">
            <div class="logo-container">
                <h1 class="logo-text">JINX <span class="flicker">Shop</span></h1>
            </div>
            <div class="header-right">
                <a href="vacio.html" class="cart-main-button">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-number">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="product-page">
        <nav class="product-nav">
            <a href="catalogo.html" class="back-arrow">← Detalles del Producto</a>
        </nav>

        <section class="product-detail">
            <div class="product-image-container">
                <img src="img/chaqueta1.webp" alt="Chaqueta Reversible" class="main-img">
            </div>

            <div class="product-info">
                <h2 class="p-name">Chaqueta reversible Kai'Sa y Akali</h2>
                <p class="p-price">$127.50</p>
                <p class="p-description">
                    Domina la Grieta con esta chaqueta de edición limitada. Diseño reversible inspirado en las integrantes de K/DA, con bordados de alta calidad y materiales resistentes.
                </p>

                <div class="size-selector">
                    <span>Talla</span>
                    <div class="sizes">
                        <button>S</button>
                        <button class="active">M</button>
                        <button>L</button>
                    </div>
                </div>
            </div>
        </section>

        <footer class="product-footer">
            <button class="btn-add-to-cart">Agregar al carrito</button>
        </footer>
    </main>

</body>
</html>
