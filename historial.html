<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Pedidos | JINX Shop</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body class="dark-theme">

    <header class="main-header">
        <div class="header-container">
            <a href="perfil.html" class="back-link">← Historial de Pedidos</a>
        </div>
    </header>

    <main class="history-container">
        <div class="order-card border-green">
            <div class="order-header">
                <h3>Orden #12345</h3>
                <span class="order-price">$125.50</span>
            </div>
            <p class="order-date">15 Oct, 2023</p>
            <div class="order-footer">
                <span class="status status-delivered">● Entregado</span>
                <a href="#" class="btn-detail">Ver detalle ></a>
            </div>
        </div>

        <div class="order-card border-yellow">
            <div class="order-header">
                <h3>Orden #12344</h3>
                <span class="order-price">$89.99</span>
            </div>
            <p class="order-date">12 Oct, 2023</p>
            <div class="order-footer">
                <span class="status status-shipping">● En camino</span>
                <a href="#" class="btn-detail">Ver detalle ></a>
            </div>
        </div>

        <div class="order-card border-red">
            <div class="order-header">
                <h3>Orden #12343</h3>
                <span class="order-price">$210.00</span>
            </div>
            <p class="order-date">05 Oct, 2023</p>
            <div class="order-footer">
                <span class="status status-cancelled">● Cancelado</span>
                <a href="#" class="btn-detail">Ver detalle ></a>
            </div>
        </div>
    </main>


</body>
</html>
