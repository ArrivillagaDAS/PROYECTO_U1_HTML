<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusJinx - Shop</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <header class="main-header">
    <div class="header-container">
        <input type="checkbox" id="menu-toggle" class="menu-checkbox">

    <label for="menu-toggle" class="hamburger-btn">
    <span></span>
    <span></span>
    <span></span>
    </label>
    <nav class="side-menu">...</nav>

        <nav class="side-menu">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="carrito.html">Carrito</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="checkout.html">Checkout</a></li>
                <li><a href="perfil.html">Perfil</a></li>

            </ul>
        </nav>

        <div class="logo-container">
            <img src="img/logo-jinx.png" alt="Logo" class="logo-icon">
            <h1 class="logo-text">JINX <span class="flicker">Shop</span></h1>
        </div>
    
        <div class="header-right">
    <a href="vacio.html" class="cart-main-button">
        <span class="cart-icon">🛒</span>
        <span class="cart-number">0</span>
    </a>
</div>

    </header>

    <main class="content">
                <section class="search-section">
            <div class="search-container">
                <i class="search-icon">🔍</i>
                <input type="text" class="jinx-search" placeholder="Buscar tesoros de Zaun...">
            </div>
        </section>

        <section class="categories-section">
            <h2 class="neon-subtitle">CATEGORÍAS POPULARES</h2>
            <div class="categories-grid">
                <div class="category-card">
                    <span>ROPA</span>
                </div>
                <div class="category-card">
                    <span>GORROS</span>
                </div>
                <div class="category-card">
                    <span>JOYERIA</span>
                </div>
            </div>
        </section>

        <section class="products-section">
            <h2 class="neon-subtitle">NOVEDADES PARA TI</h2>
            <div class="products-grid">
                
                <article class="product-card">
                    <div class="image-box">
                        <img src="img/chaqueta1.webp" alt="Chaqueta">
                    </div>
                    <div class="card-content">
                        <h3>Chaqueta Kai'Sa</h3>
                        <p class="price">$127.50</p>
                        <a href="producto.html" class="btn-neon-mini">VER</a>
                    </div>
                </article>

                <article class="product-card">
                    <div class="image-box">
                        <img src="img/yasuo1.webp" alt="Camiseta">
                    </div>
                    <div class="card-content">
                        <h3>Camiseta Gráfica</h3>
                        <p class="price">$35.00</p>
                        <button class="btn-neon-mini">VER</button>
                    </div>
                </article>

            </div>
        </section>
        </main>

    <footer class="main-footer">
        <p>2026 | JinxShop.</p>
        <p>Todos los derechos reservados.</p>
    </footer>

</body>
</html>
