<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | JINX Shop</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body class="dark-theme">

    <header class="main-header">
        <div class="header-container">
            <div class="logo-container">
                <h1 class="logo-text">NUEVO <span class="flicker">RECLUTA</span></h1>
            </div>
            <a href="index.html" class="back-link">Volver</a>
        </div>
    </header>

    <main class="auth-container">
        <section class="auth-box">
            <h2 class="section-neon-title">Crear Cuenta</h2>
            <form action="perfil.html" class="auth-form">
                <div class="form-group">
                    <label>Nombre de Usuario</label>
                    <input type="text" placeholder="Ej: Powder" class="jinx-input" required>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" placeholder="zaun@jinx.com" class="jinx-input" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="••••••••" class="jinx-input" required>
                </div>
                <button type="submit" class="btn-pay-neon">Unirse al Caos</button>
            </form>
            <p class="auth-footer">¿Ya tienes cuenta? <a href="iniciar_sesion.html">Inicia sesión aquí</a></p>
        </section>
    </main>

</body>
</html>
